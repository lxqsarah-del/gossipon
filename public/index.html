<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>预算管家</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#F5F4F0;--surface:#FFF;--s2:#EEECEA;
  --border:#E4E2DA;--border2:#CCC9BF;
  --text:#1C1C1A;--t2:#6B6960;--t3:#A8A69E;
  --green:#1E9E6B;--green-bg:#EBF7F2;
  --red:#D0342C;--red-bg:#FDECEA;
  --blue:#2563EB;--blue-bg:#EFF4FF;
  --amber:#C47A1A;--amber-bg:#FDF3E3;
  --r:14px;--rsm:9px;
}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',-apple-system,'PingFang SC',sans-serif;background:var(--bg);color:var(--text);}

/* ── Pages ── */
.page{display:none;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;overflow:hidden;}
.page.active{display:flex;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:72px;}

/* ── Onboard ── */
.ob{padding:48px 32px 40px;display:flex;flex-direction:column;height:100%;background:var(--bg);}
.ob-steps{display:flex;gap:8px;margin-bottom:48px;}
.ob-step{height:5px;flex:1;background:var(--border);border-radius:99px;transition:background .3s;}
.ob-step.on{background:var(--text);}
.ob-body{flex:1;}
.ob-icon{font-size:64px;margin-bottom:24px;}
.ob-title{font-size:28px;font-weight:700;letter-spacing:-.5px;margin-bottom:12px;line-height:1.3;}
.ob-desc{font-size:14px;color:var(--t2);line-height:1.7;margin-bottom:32px;}
.ob-feats{display:flex;flex-direction:column;gap:14px;}
.ob-feat{display:flex;align-items:center;gap:12px;font-size:13px;color:var(--t2);}
.ob-feat-ico{font-size:18px;width:24px;flex-shrink:0;}
.ob-input{width:100%;font-size:26px;font-weight:700;padding:12px 0;border-bottom:2.5px solid var(--text);margin-bottom:10px;background:none;outline:none;}
.ob-hint{font-size:12px;color:var(--t3);margin-bottom:8px;}
.ob-budget-row{display:flex;align-items:baseline;gap:6px;border-bottom:2.5px solid var(--text);padding-bottom:8px;margin-bottom:10px;}
.ob-yen{font-size:28px;font-weight:700;}
.ob-budget-input{flex:1;font-size:40px;font-weight:700;background:none;outline:none;}
.ob-cat-preview{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;margin-bottom:10px;max-height:220px;overflow:hidden;}
.ob-cat-row{display:flex;justify-content:space-between;padding:7px 0;font-size:12px;border-bottom:1px solid var(--s2);}
.ob-cat-row:last-child{border-bottom:none;}
.ob-footer{padding-top:24px;}
.ob-skip{text-align:center;font-size:13px;color:var(--t3);margin-top:14px;padding:8px;cursor:pointer;}

/* ── Bottom tab ── */
.btab{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;height:56px;background:var(--surface);border-top:1px solid var(--border);display:flex;z-index:15;}
.bt{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border:none;background:none;cursor:pointer;font-family:inherit;color:var(--t3);}
.bt.on{color:var(--text);}
.bt-ico{font-size:20px;line-height:1;}
.bt-lbl{font-size:10px;font-weight:600;}

/* ── FAB ── */
.fab{position:fixed;bottom:70px;right:calc(50% - 220px);width:52px;height:52px;border-radius:50%;background:var(--text);color:#fff;border:none;font-size:28px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;z-index:14;}
@media(max-width:520px){.fab{right:20px;}}
.fab:active{transform:scale(.93);}

/* ── Buttons ── */
.btn-p{width:100%;padding:14px;background:var(--text);color:#fff;border:none;border-radius:var(--rsm);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-p:active{opacity:.85;}
.btn-g{width:100%;padding:12px;background:none;color:var(--text);border:1.5px solid var(--border);border-radius:var(--rsm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-d{width:100%;padding:12px;background:none;color:var(--red);border:1.5px solid #f5c6c4;border-radius:var(--rsm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-stack{display:flex;flex-direction:column;gap:8px;margin-top:6px;}

/* ── Home ── */
.hdr{padding:16px 16px 10px;background:var(--bg);}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.hdr-title{font-size:20px;font-weight:700;letter-spacing:-.4px;}
.hdr-acts{display:flex;gap:8px;}
.ico-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;}
.m-sel{display:flex;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:99px;height:32px;overflow:hidden;margin:0 auto;width:fit-content;}
.mbtn{background:none;border:none;cursor:pointer;padding:0 12px;height:100%;font-size:14px;color:var(--t2);}
.mlbl{font-size:12px;font-weight:600;min-width:72px;text-align:center;}

/* Hero */
.hero{margin:10px 16px 0;border-radius:22px;padding:22px;color:#fff;position:relative;overflow:hidden;}
.hero.ok{background:#1C1C1A;}
.hero.warn{background:#92400E;}
.hero.over{background:#991B1B;}
.hero::before{content:'';position:absolute;top:-50px;right:-30px;width:150px;height:150px;border-radius:50%;background:rgba(255,255,255,.05);}
.h-lbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;opacity:.45;margin-bottom:4px;}
.h-amt{font-size:36px;font-weight:700;letter-spacing:-1.5px;line-height:1;margin-bottom:14px;}
.h-row{display:flex;gap:0;margin-bottom:12px;}
.h-stat{flex:1;}
.h-stat-l{font-size:10px;opacity:.45;margin-bottom:1px;}
.h-stat-v{font-size:14px;font-weight:700;}
.h-bar{height:5px;background:rgba(255,255,255,.15);border-radius:99px;overflow:hidden;}
.h-bar-f{height:100%;border-radius:99px;transition:width .5s;}

/* Compare */
.cmp-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:10px 16px 0;}
.cmp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;}
.cmp-l{font-size:10px;color:var(--t3);font-weight:500;margin-bottom:4px;}
.cmp-m{display:flex;align-items:baseline;gap:6px;margin-bottom:4px;}
.cmp-v{font-size:16px;font-weight:700;}
.cmp-d{font-size:10px;font-weight:700;padding:2px 7px;border-radius:99px;}
.d-up{background:var(--red-bg);color:var(--red);}
.d-dn{background:var(--green-bg);color:var(--green);}
.d-fl{background:var(--s2);color:var(--t3);}
.cmp-s{font-size:10px;color:var(--t3);}

/* Tabs */
.tab-wrap{padding:14px 16px 0;}
.tab-bar{display:flex;background:var(--s2);border-radius:99px;padding:3px;}
.tab-it{flex:1;text-align:center;padding:7px;font-size:12px;font-weight:600;border-radius:99px;border:none;background:none;color:var(--t3);cursor:pointer;font-family:inherit;}
.tab-it.on{background:var(--surface);color:var(--text);box-shadow:0 1px 5px rgba(0,0,0,.1);}

/* Cat cards */
.cat-list{padding:14px 16px 0;display:flex;flex-direction:column;gap:10px;}
.cat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px;cursor:pointer;}
.cat-card:active{background:var(--s2);}
.cat-top{display:flex;align-items:center;gap:11px;margin-bottom:10px;}
.cat-ico{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.cat-info{flex:1;min-width:0;}
.cat-name-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;flex-wrap:wrap;}
.cat-name{font-size:14px;font-weight:600;}
.cat-pill{font-size:10px;padding:1px 7px;border-radius:99px;background:var(--blue-bg);color:var(--blue);font-weight:600;}
.cat-pill-over{background:var(--red-bg);color:var(--red);}
.cat-meta{font-size:11px;color:var(--t3);}
.cat-r{text-align:right;flex-shrink:0;}
.cat-spent{font-size:15px;font-weight:700;}
.cat-bgt{font-size:10px;color:var(--t3);}
.cat-bar{height:5px;background:var(--border);border-radius:99px;overflow:hidden;display:flex;}
.cat-bar-seg{height:100%;border-radius:99px;transition:width .4s;}
.cat-foot{display:flex;justify-content:space-between;margin-top:4px;}
.cat-pct{font-size:10px;color:var(--t3);}
.cat-sync{font-size:10px;color:var(--blue);}

/* Timeline */
.tl{padding:14px 16px 0;}
.tl-empty{text-align:center;padding:60px 20px;}
.tl-empty-ico{font-size:56px;margin-bottom:16px;}
.tl-empty-t{font-size:17px;font-weight:700;margin-bottom:8px;}
.tl-empty-d{font-size:13px;color:var(--t3);line-height:1.6;margin-bottom:24px;}
.tl-empty-btn{display:inline-block;font-size:13px;font-weight:600;color:var(--blue);background:var(--blue-bg);padding:10px 20px;border-radius:99px;cursor:pointer;}
.tl-day{margin-bottom:6px;}
.tl-hdr{display:flex;align-items:center;gap:10px;padding:10px 0 6px;}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--border2);flex-shrink:0;}
.tl-date{font-size:12px;font-weight:600;color:var(--t3);flex:1;}
.tl-sum{font-size:12px;color:var(--t3);}
.tl-items{margin-left:4px;border-left:2px solid var(--border);padding-left:16px;display:flex;flex-direction:column;gap:1px;}
.tl-item{background:var(--surface);border-radius:10px;padding:11px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.tl-item:active{background:var(--s2);}
.tl-ico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.tl-body{flex:1;min-width:0;}
.tl-name{font-size:13px;font-weight:600;}
.tl-sub{font-size:11px;color:var(--t3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tl-amt{font-size:14px;font-weight:700;flex-shrink:0;}
.tl-arr{font-size:13px;color:var(--border2);flex-shrink:0;}

/* Record page */
.rp{display:flex;flex-direction:column;height:100%;background:var(--bg);}
.rp-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;flex-shrink:0;}
.rp-close{font-size:22px;color:var(--t2);cursor:pointer;width:44px;line-height:1;}
.rp-title{font-size:15px;font-weight:600;}
.rp-amt-bar{padding:8px 20px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.rp-cat-chip{display:flex;align-items:center;gap:6px;padding:7px 13px;border-radius:99px;border:1.5px solid;}
.rp-chip-lbl{font-size:12px;font-weight:600;}
.rp-amt{font-size:38px;font-weight:700;letter-spacing:-1.5px;}
.rp-amt.ph{color:var(--t3);}
.rp-cats{flex:1;overflow-y:auto;padding:0 12px 8px;}
.rp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px 4px;}
.rp-cat-it{display:flex;flex-direction:column;align-items:center;gap:5px;padding:10px 4px;border-radius:10px;cursor:pointer;border:none;background:none;font-family:inherit;}
.rp-circle{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;transition:.15s;}
.rp-cat-it.sel .rp-circle{box-shadow:0 3px 12px rgba(0,0,0,.2);transform:scale(1.08);}
.rp-cat-lbl{font-size:10px;font-weight:500;color:var(--t2);}
.rp-cat-it.sel .rp-cat-lbl{font-weight:700;color:var(--text);}
.rp-sub-row{display:flex;flex-wrap:wrap;gap:7px;padding:10px 8px 4px;border-top:1px solid var(--border);margin-top:6px;}
.rp-sub-it{padding:6px 14px;border-radius:99px;border:1.5px solid var(--border);background:none;font-size:12px;font-weight:600;color:var(--t2);cursor:pointer;font-family:inherit;}
.rp-sub-it.on{border-color:var(--text);background:var(--text);color:#fff;}
.rp-extras{padding:6px 16px 8px;display:flex;gap:8px;align-items:center;flex-shrink:0;}
.rp-extra-in{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--text);font-family:inherit;outline:none;}
.rp-date-btn{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;font-size:13px;color:var(--t2);cursor:pointer;font-family:inherit;white-space:nowrap;}
.rp-loc-btn{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;font-size:14px;cursor:pointer;}
.rp-loc-line{padding:0 16px 6px;font-size:11px;color:var(--t3);display:flex;align-items:center;gap:6px;flex-shrink:0;}
.numpad{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--border);flex-shrink:0;}
.np-dr{grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--s2);border-bottom:1px solid var(--border);}
.np-dr-l{font-size:12px;color:var(--t2);}
.np-dr-v{font-size:12px;font-weight:600;}
.np-k{display:flex;align-items:center;justify-content:center;height:58px;background:var(--surface);border:none;border-right:1px solid var(--border);border-bottom:1px solid var(--border);font-size:20px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--text);}
.np-k:nth-child(4n){border-right:none;}
.np-k:active{background:#E8E6E0;}
.np-act{background:var(--s2);font-size:14px;font-weight:600;color:var(--t2);}
.np-act:active{background:#DDD9CF;}
.np-ok{background:var(--text);color:#fff;font-size:17px;font-weight:700;}
.np-ok:active{background:#333;}
.np-ok.edit{background:var(--green);}
.del-bar{text-align:center;padding:14px;font-size:14px;color:var(--red);cursor:pointer;flex-shrink:0;border-top:1px solid var(--border);}

/* Breadcrumb */
.bc{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--t3);padding:10px 16px 0;}
.bc-it{cursor:pointer;}.bc-it:hover{color:var(--text);}
.bc-cur{color:var(--text);font-weight:600;}
.bc-sep{opacity:.4;}

/* Sub hero */
.sub-hero{margin:10px 16px 0;border-radius:var(--r);padding:18px;color:#fff;overflow:hidden;}
.sub-hero-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.sub-hero-n{font-size:17px;font-weight:700;}
.sub-hero-p{font-size:11px;opacity:.7;margin-top:2px;}
.sub-badge{font-size:11px;font-weight:600;padding:5px 12px;border-radius:99px;background:rgba(255,255,255,.2);cursor:pointer;border:none;font-family:inherit;color:#fff;}
.sub-stats{display:flex;gap:16px;}
.ss{flex:1;}.ss-l{font-size:10px;opacity:.6;margin-bottom:2px;}.ss-v{font-size:16px;font-weight:700;}

/* Mine page */
.mine-hdr{padding:24px 16px 16px;background:var(--surface);border-bottom:1px solid var(--border);}
.mine-av-row{display:flex;align-items:center;gap:14px;}
.mine-av{width:56px;height:56px;border-radius:50%;background:var(--s2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:26px;cursor:pointer;flex-shrink:0;}
.mine-name{font-size:17px;font-weight:700;}
.mine-sub{font-size:12px;color:var(--t3);margin-top:2px;}
.mine-edit{margin-left:auto;font-size:12px;font-weight:600;color:var(--blue);border:1px solid var(--blue-bg);background:var(--blue-bg);border-radius:7px;padding:6px 14px;cursor:pointer;font-family:inherit;}
.mine-sec{margin:14px 16px 0;}
.mine-sec-ttl{font-size:11px;font-weight:700;color:var(--t3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:8px;padding:0 4px;}
.mine-grp{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);overflow:hidden;}
.mrow{display:flex;align-items:center;padding:14px 16px;border-bottom:1px solid var(--border);cursor:pointer;gap:12px;}
.mrow:last-child{border-bottom:none;}
.mrow:active{background:var(--s2);}
.mrow-ico{font-size:18px;width:24px;text-align:center;flex-shrink:0;}
.mrow-body{flex:1;min-width:0;}
.mrow-t{font-size:14px;font-weight:500;}
.mrow-s{font-size:11px;color:var(--t3);margin-top:1px;}
.mrow-r{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.mrow-arr{font-size:14px;color:var(--t3);opacity:.5;}
.mbadge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;}
.b-pro{background:#FEF3C7;color:#92400E;}
.b-free{background:var(--green-bg);color:var(--green);}
.b-ai{background:var(--blue-bg);color:var(--blue);}
.toggle{width:44px;height:26px;border-radius:99px;background:var(--border2);border:none;cursor:pointer;position:relative;transition:.2s;flex-shrink:0;}
.toggle.on{background:#34C759;}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2);}
.toggle.on::after{left:21px;}

/* Overlay */
.ov-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:20;display:flex;align-items:center;justify-content:center;padding:16px;}
.ov{background:var(--surface);border-radius:20px;width:100%;max-width:440px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.18);animation:pop .2s cubic-bezier(.34,1.3,.64,1);}
@keyframes pop{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
.ov-in{padding:20px;}
.ov-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.ov-title{font-size:16px;font-weight:700;}
.ov-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--t3);}
.fi{margin-bottom:12px;}
.fi label{font-size:10px;font-weight:700;color:var(--t3);display:block;margin-bottom:5px;letter-spacing:.04em;text-transform:uppercase;}
.fi input,.fi select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--rsm);font-size:13px;background:var(--s2);color:var(--text);font-family:inherit;}
.fi input:focus,.fi select:focus{outline:none;border-color:var(--text);}
.fi-row{display:flex;gap:8px;}
.fi-row .fi{flex:1;}
.color-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px;}
.cdot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;}
.cdot.s{border-color:var(--text);transform:scale(1.12);}
.stat3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px;}
.s3c{background:var(--s2);border-radius:10px;padding:10px;}
.s3l{font-size:9px;color:var(--t3);font-weight:600;margin-bottom:3px;}
.s3v{font-size:15px;font-weight:700;}
.s3d{font-size:9px;font-weight:700;padding:1px 5px;border-radius:99px;display:inline-block;margin-top:2px;}
.seg{display:flex;background:var(--s2);border-radius:99px;padding:3px;margin-bottom:14px;}
.seg-btn{flex:1;text-align:center;padding:7px;font-size:12px;font-weight:600;border-radius:99px;border:none;background:none;color:var(--t3);cursor:pointer;font-family:inherit;}
.seg-btn.a{background:var(--surface);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.io-area{font-size:11px;font-family:monospace;width:100%;min-height:80px;padding:8px;border:1.5px solid var(--border);border-radius:var(--rsm);background:var(--s2);color:var(--text);resize:vertical;}
.dv{border:none;border-top:1px solid var(--border);margin:12px 0;}
.note-box{font-size:12px;color:var(--t3);background:var(--s2);border-radius:8px;padding:10px 12px;margin-bottom:12px;line-height:1.6;}
.cmgr-row{display:flex;align-items:center;gap:7px;padding:9px 0;border-bottom:1px solid var(--border);}
.cmgr-row:last-of-type{border-bottom:none;}
.cmgr-row select,.cmgr-row input[type=text],.cmgr-row input[type=number]{padding:7px 9px;border:1.5px solid var(--border);border-radius:7px;font-size:12px;background:var(--s2);color:var(--text);font-family:inherit;}
.cmgr-row select{width:48px;}.cmgr-row input[type=text]{flex:1;}.cmgr-row input[type=number]{width:76px;}
.cmgr-minus{width:28px;height:28px;border-radius:50%;border:1.5px solid #f0c0bc;background:none;cursor:pointer;color:var(--red);font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}

<script>
// ── Constants ──
const COLS=['#E07B39','#3A86C8','#7C5CBF','#E8547A','#2BAE84','#4A8C22','#C4831A','#D4537E','#1E6FD9','#533BB7','#0F6E56','#993C1D','#7A7975'];
const ICNS=['🍜','🚇','🛍️','🎬','🏥','📚','🏠','✈️','💰','🎮','☕','🐾','👶','💪','🎨','🏖️','🎒','🏨','⛽','🎪','🍺','🎵','🗾','🏔️','🎭','🧘','🍕','🚗','💊','✨','👥','📋','🔑','🏦','💇','🩺','🛡️','📱','📖','🎓','🎁','🧧','🥂','🔄','🛵','🍽️','🚌'];
const MN=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const uid=()=>'i'+Date.now()+Math.floor(Math.random()*9999);
const fmt=n=>'¥'+Math.abs(Math.round(n)).toLocaleString('zh-CN');
const fmtS=n=>{n=Math.abs(Math.round(n));return n>=10000?'¥'+(n/10000).toFixed(1)+'万':'¥'+n.toLocaleString('zh-CN');};
const pct=(a,b)=>b===0?0:Math.min(100,Math.round(a/b*100));
const barC=(s,b)=>{const p=pct(s,b);return p>=100?'#EF4444':p>=80?'#F59E0B':'#10B981';};

// ── Default categories (revised) ──

  {id:'mc2',name:'交通',budget:800,color:COLS[1],icon:'🚇',subcats:[{id:'mc2s1',name:'公共交通',icon:'🚌'},{id:'mc2s2',name:'打车',icon:'🚖'},{id:'mc2s3',name:'高铁',icon:'🚄'},{id:'mc2s4',name:'飞机',icon:'✈️'},{id:'mc2s5',name:'油费·充能',icon:'⛽'},{id:'mc2s6',name:'养车',icon:'🚗'},{id:'mc2s7',name:'其他',icon:'🗺️'}]},
  {id:'mc3',name:'住房',budget:4000,color:COLS[2],icon:'🏠',subcats:[{id:'mc3s1',name:'房租',icon:'🔑'},{id:'mc3s2',name:'房贷',icon:'🏦'},{id:'mc3s3',name:'物业',icon:'🏢'},{id:'mc3s4',name:'水电网',icon:'💡'},{id:'mc3s5',name:'其他',icon:'🏡'}]},
  {id:'mc4',name:'购物',budget:1500,color:COLS[3],icon:'🛍️',subcats:[{id:'mc4s1',name:'服装',icon:'👕'},{id:'mc4s2',name:'鞋包',icon:'👟'},{id:'mc4s3',name:'饰品',icon:'💍'},{id:'mc4s4',name:'家居',icon:'🛋️'},{id:'mc4s5',name:'数码',icon:'💻'},{id:'mc4s6',name:'其他',icon:'🛒'}]},
  {id:'mc5',name:'健康',budget:600,color:COLS[4],icon:'🏥',subcats:[{id:'mc5s1',name:'医疗',icon:'💊'},{id:'mc5s2',name:'保健品',icon:'🌿'},{id:'mc5s3',name:'体检',icon:'🩺'},{id:'mc5s4',name:'保险',icon:'🛡️'},{id:'mc5s5',name:'其他',icon:'❤️'}]},
  {id:'mc6',name:'运动',budget:600,color:COLS[5],icon:'💪',subcats:[{id:'mc6s1',name:'健身·私教',icon:'🏋️'},{id:'mc6s2',name:'运动装备',icon:'🎽'},{id:'mc6s3',name:'赛事报名',icon:'🏅'},{id:'mc6s4',name:'其他',icon:'⚽'}]},
  {id:'mc7',name:'美容护理',budget:500,color:COLS[6],icon:'✨',subcats:[{id:'mc7s1',name:'美发',icon:'💇'},{id:'mc7s2',name:'护肤',icon:'🧴'},{id:'mc7s3',name:'美甲',icon:'💅'},{id:'mc7s4',name:'按摩·疗愈',icon:'💆'},{id:'mc7s5',name:'其他',icon:'🪞'}]},
  {id:'mc8',name:'娱乐',budget:600,color:COLS[7],icon:'🎬',subcats:[{id:'mc8s1',name:'影视',icon:'🎥'},{id:'mc8s2',name:'演出',icon:'🎭'},{id:'mc8s3',name:'游戏',icon:'🎮'},{id:'mc8s4',name:'其他',icon:'🎪'}]},
  {id:'mc9',name:'学习',budget:400,color:COLS[8],icon:'📚',subcats:[{id:'mc9s1',name:'书籍',icon:'📖'},{id:'mc9s2',name:'课程',icon:'🎓'},{id:'mc9s3',name:'其他',icon:'✏️'}]},
  {id:'mc10',name:'人情',budget:500,color:COLS[9],icon:'🎁',subcats:[{id:'mc10s1',name:'礼金·红包',icon:'🧧'},{id:'mc10s2',name:'礼物',icon:'🎁'},{id:'mc10s3',name:'聚会请客',icon:'🥂'},{id:'mc10s4',name:'其他',icon:'💝'}]},
  {id:'mc11',name:'订阅',budget:300,color:COLS[10],icon:'📱',subcats:[{id:'mc11s1',name:'流媒体',icon:'🎵'},{id:'mc11s2',name:'软件会员',icon:'💻'},{id:'mc11s3',name:'话费·宽带',icon:'📡'},{id:'mc11s4',name:'其他',icon:'🔄'}]},
  {id:'mc12',name:'旅游',budget:1000,color:COLS[11],icon:'🏖️',subcats:[]},
  {id:'mc13',name:'其他',budget:700,color:COLS[12],icon:'📋',subcats:[]},
];

// ── Profile ──
let P=(()=>{try{return JSON.parse(localStorage.getItem('bgp')||'{}')}catch(e){return{}}})();
P.name=P.name||'';P.phone=P.phone||'';
P.reminderOn=P.reminderOn!==undefined?P.reminderOn:true;
P.reminderTime=P.reminderTime||'21:00';
P.reminderNodes=P.reminderNodes||[50,80,100];
P.proUnlocked=P.proUnlocked||false;
function saveP(){try{localStorage.setItem('bgp',JSON.stringify(P))}catch(e){}}

// ── App state ──
let V={
  month:new Date().getMonth(),year:new Date().getFullYear(),
  view:'main',tab:'cats',totalBudget:13000,
  mainCats:null,
  mainRecs:[],subs:[],
  overlay:null,_ovArg:null,
  _nc:{color:COLS[0]},_ns:{color:COLS[2]},_ec:{color:null},_es:{color:null},
  ioTab:'export',impFmt:'csv',
  _detailCat:null,_editCat:null,_editSub:null,_subFor:null,_subcatCat:null,
};

// Load saved data
(function loadData(){
  try{
    const saved=localStorage.getItem('bgv');
    if(saved){const d=JSON.parse(saved);V.totalBudget=d.totalBudget||13000;V.mainCats=d.mainCats||null;V.mainRecs=d.mainRecs||[];V.subs=d.subs||[];}
  }catch(e){}
  if(!V.mainCats)V.mainCats=JSON.parse(JSON.stringify(DEFAULT_CATS));
})();

function saveData(){try{localStorage.setItem('bgv',JSON.stringify({totalBudget:V.totalBudget,mainCats:V.mainCats,mainRecs:V.mainRecs,subs:V.subs}))}catch(e){}}

// ── Helpers ──
const byM=(recs,m,y)=>recs.filter(r=>{const d=new Date(r.date);return d.getMonth()===m&&d.getFullYear()===y;});
const subSpent=(sl,m,y)=>byM(sl.recs,m,y).reduce((s,r)=>s+r.amount,0);
const subsOf=mcId=>V.subs.filter(s=>s.parentCatId===mcId);
const syncedOf=(mcId,m,y)=>subsOf(mcId).reduce((s,sl)=>s+subSpent(sl,m,y),0);
const directOf=(mcId,m,y)=>byM(V.mainRecs,m,y).filter(r=>r.catId===mcId).reduce((s,r)=>s+r.amount,0);
const totalOf=(mcId,m,y)=>directOf(mcId,m,y)+syncedOf(mcId,m,y);
const grandTotal=(m,y)=>V.mainCats.reduce((s,c)=>s+totalOf(c.id,m,y),0);
const catBudgetSum=()=>V.mainCats.reduce((s,c)=>s+c.budget,0);
const inSub=()=>V.view!=='main';
const curSub=()=>V.subs.find(s=>s.id===V.view)||null;
const curCats=()=>inSub()?curSub().cats:V.mainCats;
function prevMY(){let m=V.month-1,y=V.year;if(m<0){m=11;y--;}return{m,y};}
const prevYMY=()=>({m:V.month,y:V.year-1});
function delta(cur,prev){
  if(!prev)return{txt:'--',cls:'d-fl'};
  const d=cur-prev,p=Math.round(d/prev*100);
  if(Math.abs(p)<1)return{txt:'持平',cls:'d-fl'};
  return{txt:(d>0?'+':'')+p+'%',cls:d>0?'d-up':'d-dn'};
}
function exportCSV(){
  const sl=curSub(),cats=inSub()?sl.cats:V.mainCats,recs=inSub()?sl.recs:V.mainRecs;
  const rows=[['日期','分类','子目录','描述','金额','地点']];
  [...recs].sort((a,b)=>a.date.localeCompare(b.date)).forEach(r=>{
    const c=cats.find(x=>x.id===r.catId);
    const sc=c&&c.subcats&&r.subCatId?c.subcats.find(x=>x.id===r.subCatId):null;
    rows.push([r.date,c?c.name:'',sc?sc.name:'',r.desc||'',r.amount,r.loc||'']);
  });
  return rows.map(r=>r.join(',')).join('\n');
}
function exportJSON(){return JSON.stringify({totalBudget:V.totalBudget,mainCats:V.mainCats,mainRecs:V.mainRecs,subs:V.subs},null,2);}
function dlFile(c,n,t){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([c],{type:t}));a.download=n;a.click();}

// ── Budget alert check ──
function checkAlerts(){
  if(!P.reminderOn)return;
  const cm=V.month,cy=V.year;
  const s=grandTotal(cm,cy),u=pct(s,V.totalBudget);
  const triggered=P.reminderNodes.filter(n=>u>=n);
  if(!triggered.length)return;
  const mx=Math.max(...triggered),key='alrt_'+cy+'_'+cm+'_'+mx;
  if(!sessionStorage.getItem(key)){sessionStorage.setItem(key,'1');setTimeout(()=>{if(confirm('⚠️ 预算提醒\n本月预算已使用 '+u+'%（达到'+mx+'%节点）\n\n点确定查看详情')){}},800);}
}

// ══════════════════════════════
// ONBOARD
// ══════════════════════════════
let OB={step:1,name:'',budget:''};
function renderOnboard(){
  const el=document.getElementById('ob-content');
  let h='';
  h+=`<div class="ob-steps">
    <div class="ob-step${OB.step>=1?' on':''}"></div>
    <div class="ob-step${OB.step>=2?' on':''}"></div>
    <div class="ob-step${OB.step>=3?' on':''}"></div>
  </div><div class="ob-body">`;
  if(OB.step===1){
    h+=`<div class="ob-icon">💰</div>
    <div class="ob-title">你好，欢迎使用<br>预算管家</div>
    <div class="ob-desc">先设预算，再花钱。每笔支出实时扣减，让你随时清楚还剩多少可以花。</div>
    <div class="ob-feats">
      <div class="ob-feat"><span class="ob-feat-ico">📊</span><span>实时预算进度，超支立即可见</span></div>
      <div class="ob-feat"><span class="ob-feat-ico">🗂</span><span>分类 + 子目录，支出一目了然</span></div>
      <div class="ob-feat"><span class="ob-feat-ico">✈️</span><span>子账本管理旅行、出差等项目</span></div>
      <div class="ob-feat"><span class="ob-feat-ico">🤖</span><span>AI 分析支出，给出调整建议</span></div>
    </div>`;
  } else if(OB.step===2){
    h+=`<div class="ob-icon">👤</div>
    <div class="ob-title">你叫什么？</div>
    <div class="ob-desc">设置昵称，让账本更有归属感</div>
    <input class="ob-input" id="ob-name" type="text" placeholder="输入你的昵称" value="${OB.name}" maxlength="10" oninput="OB.name=this.value" autofocus/>
    <div class="ob-hint">也可以跳过，之后在「我的」里设置</div>`;
  } else {
    const cats=DEFAULT_CATS;
    h+=`<div class="ob-icon">🎯</div>
    <div class="ob-title">设定月度总预算</div>
    <div class="ob-desc">建议按实际收入减去固定储蓄来定</div>
    <div class="ob-budget-row">
      <span class="ob-yen">¥</span>
      <input class="ob-budget-input" id="ob-budget" type="number" placeholder="13000" value="${OB.budget}" oninput="OB.budget=this.value" autofocus/>
    </div>
    <div class="ob-hint">已预设 13 个分类，合计预算 ¥13,000</div>
    <div class="ob-cat-preview">${cats.map(c=>`<div class="ob-cat-row"><span>${c.icon} ${c.name}</span><span style="color:var(--t2);font-weight:600;">¥${c.budget.toLocaleString()}</span></div>`).join('')}</div>
    <div class="ob-hint">各分类预算可在「管理分类」里随时调整</div>`;
  }
  h+=`</div><div class="ob-footer">`;
  if(OB.step===1)h+=`<button class="btn-p" onclick="obNext()">开始设置 →</button>`;
  else if(OB.step===2)h+=`<button class="btn-p" onclick="obNext()">下一步</button><div class="ob-skip" onclick="obNext()">跳过</div>`;
  else h+=`<button class="btn-p" onclick="obFinish()">开始使用 →</button>`;
  h+=`</div>`;
  el.innerHTML=h;
}
function obNext(){
  if(OB.step===2&&OB.name.trim())P.name=OB.name.trim(),saveP();
  OB.step++;renderOnboard();
}
function obFinish(){
  const b=parseFloat(OB.budget);if(b>0)V.totalBudget=b;
  if(OB.name.trim())P.name=OB.name.trim(),saveP();
  saveData();localStorage.setItem('launched','1');
  document.getElementById('btab').style.display='flex';
  showPage('pg-home');renderHome();
}

// ══════════════════════════════
// TAB / PAGE NAVIGATION
// ══════════════════════════════
function switchTab(tab){
  document.querySelectorAll('.bt').forEach(b=>b.classList.remove('on'));
  document.getElementById('bt-'+tab).classList.add('on');
  document.getElementById('fab').style.display=tab==='home'?'flex':'none';
  if(tab==='home'){showPage('pg-home');renderHome();}
  else{showPage('pg-mine');renderMine();}
}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}
function goRecord(){
  R={mode:'add',editId:null,amtStr:'',catId:curCats()[0]?.id||null,subCatId:null,date:tod(),desc:'',loc:''};
  renderRecordPage();showPage('pg-record');
}
function goEditRecord(id){
  const recs=inSub()?(curSub()||{recs:[]}).recs:V.mainRecs;
  const rec=recs.find(r=>r.id===id);if(!rec)return;
  R={mode:'edit',editId:id,amtStr:String(rec.amount),catId:rec.catId,subCatId:rec.subCatId||null,date:rec.date,desc:rec.desc||'',loc:rec.loc||''};
  renderRecordPage();showPage('pg-record');
}
function closeRecordPage(){showPage('pg-home');renderHome();}
function goMain(){V.view='main';V.selCat=null;V.tab='cats';renderHome();}
function enterSub(id){V.view=id;V.selCat=null;V.tab='cats';closeOverlay();renderHome();}
function pM(){V.month===0?(V.month=11,V.year--):V.month--;V.selCat=null;renderHome();}
function nM(){V.month===11?(V.month=0,V.year++):V.month++;V.selCat=null;renderHome();}

// ══════════════════════════════
// HOME PAGE
// ══════════════════════════════
function renderHome(){
  const cm=V.month,cy=V.year,{m:pm,y:py}=prevMY(),{m:lym,y:lyy}=prevYMY();
  const sl=curSub(),cats=curCats();
  const vSpent=inSub()?subSpent(sl,cm,cy):grandTotal(cm,cy);
  const vBudget=inSub()?cats.reduce((s,c)=>s+c.budget,0):V.totalBudget;
  const vRem=vBudget-vSpent,spPct=pct(vSpent,vBudget),isOver=vSpent>vBudget;
  const ps=inSub()?0:grandTotal(pm,py),lys=inSub()?0:grandTotal(lym,lyy);
  const md=delta(vSpent,ps),yd=delta(vSpent,lys);
  let h='';
  if(inSub()){
    const pc=V.mainCats.find(c=>c.id===sl.parentCatId);

function renderTimeline(recs,cats){
  const sorted=[...recs].sort((a,b)=>b.date.localeCompare(a.date));
  const groups={};sorted.forEach(r=>{if(!groups[r.date])groups[r.date]=[];groups[r.date].push(r);});
  let h='<div class="tl">';
  Object.keys(groups).sort((a,b)=>b.localeCompare(a)).forEach(date=>{
    const d=new Date(date+'T00:00:00'),daySum=groups[date].reduce((s,r)=>s+r.amount,0);
    h+=`<div class="tl-day"><div class="tl-hdr"><div class="tl-dot"></div><span class="tl-date">${d.getMonth()+1}月${d.getDate()}日${date===tod()?' 今天':''}</span><span class="tl-sum">-${fmt(daySum)}</span></div><div class="tl-items">`;
    groups[date].forEach(rec=>{
      const c=cats.find(x=>x.id===rec.catId);
      const sc=c&&c.subcats&&rec.subCatId?c.subcats.find(x=>x.id===rec.subCatId):null;
      const parts=[];if(sc)parts.push(sc.icon+' '+sc.name);if(rec.desc)parts.push(rec.desc);if(rec.loc)parts.push('📍'+rec.loc);
      h+=`<div class="tl-item" onclick="goEditRecord('${rec.id}')">
        <div class="tl-ico" style="background:${c?c.color+'22':'#eee'}">${c?c.icon:'?'}</div>
        <div class="tl-body"><div class="tl-name">${c?c.name:'未知'}</div>${parts.length?`<div class="tl-sub">${parts.join(' · ')}</div>`:''}</div>
        <div class="tl-amt">-${fmt(rec.amount)}</div>
        <div class="tl-arr">›</div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  return h+'</div>';
}

let R={mode:'add',editId:null,amtStr:'',catId:null,subCatId:null,date:tod(),desc:'',loc:''};
function renderRecordPage(){
  const cats=curCats();
  if(!R.catId&&cats.length)R.catId=cats[0].id;

  let h=`<div class="rp-bar"><span class="rp-close" onclick="closeRecordPage()">✕</span><span class="rp-title">${isEdit?'编辑支出':'记一笔'}</span><span style="width:44px"></span></div>
  <div class="rp-amt-bar">
    <div class="rp-cat-chip" style="background:${sel?sel.color+'22':'#eee'};border-color:${sel?sel.color+'44':'#eee'}">
      <span>${sel?sel.icon:'?'}</span><span class="rp-chip-lbl" style="color:${sel?sel.color:'#888'}">${sel?sel.name:''}</span>
    </div>
    <div class="rp-amt${R.amtStr?'':' ph'}">¥ ${R.amtStr||'0'}</div>
  </div>
  <div class="rp-cats">
    <div class="rp-grid">
      ${cats.map(c=>`<button class="rp-cat-it${R.catId===c.id?' sel':''}" onclick="rpSelCat('${c.id}')"><div class="rp-circle" style="background:${R.catId===c.id?c.color:c.color+'22'}">${c.icon}</div><span class="rp-cat-lbl">${c.name}</span></button>`).join('')}
    </div>
    ${(()=>{const sc=sel&&sel.subcats&&sel.subcats.length?sel.subcats:null;if(!sc)return'';return`<div class="rp-sub-row"><button class="rp-sub-it${!R.subCatId?' on':''}" onclick="rpSelSub('')">跳过</button>${sc.map(s=>`<button class="rp-sub-it${R.subCatId===s.id?' on':''}" onclick="rpSelSub('${s.id}')">${s.icon} ${s.name}</button>`).join('')}</div>`;})()}
  </div>
  <div class="rp-extras">
    <input class="rp-extra-in" id="rp-desc" placeholder="备注（可选）" value="${R.desc}" oninput="R.desc=this.value"/>
    <input type="date" id="rp-date-real" value="${R.date}" style="opacity:0;position:absolute;pointer-events:none;width:0;height:0;" onchange="R.date=this.value;renderRecordPage()"/>
    <button class="rp-date-btn" onclick="document.getElementById('rp-date-real').showPicker?document.getElementById('rp-date-real').showPicker():document.getElementById('rp-date-real').click()">${dateLbl}</button>
    <button class="rp-loc-btn" id="rp-loc-btn" onclick="rpLocate()">📍</button>
  </div>
  ${R.loc?`<div class="rp-loc-line">📍 ${R.loc} <span onclick="R.loc='';renderRecordPage()" style="cursor:pointer;opacity:.6">×</span></div>`:''}
  <div class="numpad">
    <div class="np-dr"><span class="np-dr-l">${R.date===tod()?'今天':'日期'}</span><span class="np-dr-v">${R.date}</span></div>
    ${['1','2','3','⌫','4','5','6','清除','7','8','9','00','.',  '0','','OK'].map((k,i)=>{
      if(k==='OK')return`<button class="np-k np-ok${isEdit?' edit':''}" onclick="rpSave()">${isEdit?'保存':'OK'}</button>`;
      if(k==='⌫')return`<button class="np-k np-act" onclick="R.amtStr=R.amtStr.slice(0,-1);npUpd()">⌫</button>`;
      if(k==='清除')return`<button class="np-k np-act" onclick="R.amtStr='';npUpd()">清除</button>`;
      if(k==='00')return`<button class="np-k np-act" onclick="npKey('00')">00</button>`;
      if(k==='')return`<button class="np-k np-act" style="pointer-events:none"></button>`;
      return`<button class="np-k${k==='.'?' np-act':''}" onclick="npKey('${k}')">${k}</button>`;
    }).join('')}
  </div>
  ${isEdit?`<div class="del-bar" onclick="delRec('${R.editId}')">删除这条记录</div>`:''}`;

function rpSelCat(id){R.catId=id;R.subCatId=null;renderRecordPage();}
function rpSelSub(id){R.subCatId=id;document.querySelectorAll('.rp-sub-it').forEach(el=>{el.classList.toggle('on',(id===''&&el.getAttribute('onclick').includes("''"))||(id&&el.getAttribute('onclick').includes(`'${id}'`)));});}
function npKey(k){
  if(k==='00'){if(R.amtStr&&!R.amtStr.includes('.'))R.amtStr+='00';else if(!R.amtStr)R.amtStr='0';else return;}
  else if(k==='.'){if(!R.amtStr.includes('.'))R.amtStr+='.';}
  else{const p=R.amtStr.split('.');if(p.length>1&&p[1].length>=2)return;if(R.amtStr.length>=8)return;R.amtStr=R.amtStr==='0'?k:R.amtStr+k;}
  npUpd();
}
function npUpd(){const el=document.querySelector('.rp-amt');if(el){el.textContent='¥ '+(R.amtStr||'0');el.className='rp-amt'+(R.amtStr?'':' ph');}const dv=document.querySelector('.np-dr-v');if(dv)dv.textContent=R.date;}
function rpSave(){
  const amount=parseFloat(R.amtStr);if(isNaN(amount)||amount<=0)return;
  const rec={catId:R.catId,subCatId:R.subCatId||null,desc:R.desc,amount,date:R.date,loc:R.loc};
  if(R.mode==='edit'&&R.editId){const recs=inSub()?(curSub()||{recs:[]}).recs:V.mainRecs;const r=recs.find(x=>x.id===R.editId);if(r)Object.assign(r,rec);}
  else{const nr={id:uid(),...rec};if(inSub()){const s=curSub();if(s)s.recs.push(nr);}else V.mainRecs.push(nr);}
  saveData();closeRecordPage();
}
function rpLocate(){
  const btn=document.getElementById('rp-loc-btn');
  if(!navigator.geolocation){alert('不支持定位');return;}
  btn.textContent='⏳';
  navigator.geolocation.getCurrentPosition(async pos=>{
    const{latitude:la,longitude:lo}=pos.coords;
    try{const r=await fetch('https://nominatim.openstreetmap.org/reverse?lat='+la+'&lon='+lo+'&format=json&accept-language=zh');const d=await r.json();const a=d.address||{};const n=a.amenity||a.shop||a.road||a.neighbourhood||a.suburb||'';const c=a.city||a.town||'';R.loc=[n,c].filter(Boolean).join(' · ')||la.toFixed(4)+','+lo.toFixed(4);}
    catch(e){R.loc=la.toFixed(4)+','+lo.toFixed(4);}
    btn.textContent='📍';renderRecordPage();
  },()=>{btn.textContent='📍';},{timeout:8000});
}

function showOverlay(type,arg){
  V.overlay=type;V._ovArg=arg||null;
  if(type==='catdetail')V._detailCat=arg;
  if(type==='editsub'){const s=V.subs.find(x=>x.id===arg);V._editSub=s?{...s}:null;}
  if(type==='editcat'){const c=curCats().find(x=>x.id===arg);if(c){V._editCat={...c};V._ec.color=c.color;}}
  if(type==='newsub')V._subFor=arg;
  if(type==='subcatmgr'){V._subcatCat=arg;const cat=V.mainCats.find(c=>c.id===arg);window._scRows=cat?(cat.subcats||[]).map(s=>({...s,_del:false})):[];}
  renderOverlay();document.getElementById('ov-bg').style.display='flex';
}
function closeOverlay(){document.getElementById('ov-bg').style.display='none';V.overlay=null;V._detailCat=null;V._editCat=null;V._editSub=null;renderHome();}

// ── Cat manager ──
window._cmRows=[];
function renderCmgrRows(){
  const w=document.getElementById('cat-rows');if(!w)return;
  let h='';
  window._cmRows.forEach((r,i)=>{if(r._del)return;
    const cd=COLS.map(c=>`<div class="cdot${c===r.color?' s':''}" style="background:${c};width:18px;height:18px;" data-c="${c}" onclick="_cmRows[${i}].color='${c}';renderCmgrRows()"></div>`).join('');
    h+=`<div class="cmgr-row"><select onchange="_cmRows[${i}].icon=this.value">${ICNS.map(ic=>`<option${ic===r.icon?' selected':''}>${ic}</option>`).join('')}</select><input type="text" value="${r.name}" placeholder="分类名称" oninput="_cmRows[${i}].name=this.value"/><input type="number" value="${r.budget}" placeholder="预算" oninput="_cmRows[${i}].budget=+this.value;updateBudgetSum()"/><div style="display:flex;gap:3px;">${cd}</div><button class="cmgr-minus" onclick="cmgrDel(${i})">−</button></div>`;
  });w.innerHTML=h;
  updateBudgetSum();
}
function updateBudgetSum(){
  const el=document.querySelector('.budget-sum');if(!el)return;
  const catSum=window._cmRows.filter(r=>!r._del).reduce((s,r)=>s+(parseFloat(r.budget)||0),0);
  const diff=V.totalBudget-catSum;
  el.className='budget-sum '+(diff===0?'ok':diff<0?'over':'under');
  el.textContent=diff===0?'✓ 分类预算已完全分配':diff<0?`超出总预算 ${fmt(Math.abs(diff))}`:`还有 ${fmt(diff)} 未分配`;
}
function cmgrAdd(){window._cmRows.push({id:uid(),name:'',budget:500,color:COLS[window._cmRows.filter(r=>!r._del).length%COLS.length],icon:'📋',subcats:[],_new:true});renderCmgrRows();const o=document.querySelector('.ov');if(o)o.scrollTop=o.scrollHeight;}
function cmgrDel(i){const r=window._cmRows[i];if(r._new){window._cmRows.splice(i,1);renderCmgrRows();return;}if(!confirm('删除「'+r.name+'」及其所有记录？'))return;window._cmRows[i]._del=true;renderCmgrRows();}
function cmgrSave(){
  const rows=window._cmRows,cats=inSub()?(curSub()||{cats:[]}).cats:V.mainCats;
  rows.filter(r=>r._del).forEach(r=>{if(inSub()){const s=curSub();if(s){s.cats=s.cats.filter(c=>c.id!==r.id);s.recs=s.recs.filter(x=>x.catId!==r.id);}}else{V.mainCats=V.mainCats.filter(c=>c.id!==r.id);V.mainRecs=V.mainRecs.filter(x=>x.catId!==r.id);}});
  rows.filter(r=>!r._del).forEach(r=>{if(!r.name.trim())return;const ex=cats.find(c=>c.id===r.id);if(ex){ex.name=r.name;ex.budget=r.budget||500;ex.icon=r.icon;ex.color=r.color;}else{const nc={id:r.id,name:r.name.trim(),budget:r.budget||500,color:r.color,icon:r.icon,subcats:r.subcats||[]};if(inSub()){const s=curSub();if(s)s.cats.push(nc);}else V.mainCats.push(nc);}});
  saveData();closeOverlay();
}

window._nsr=[];
function renderNSR(){const w=document.getElementById('ns-rows');if(!w)return;let h='';window._nsr.forEach((r,i)=>{h+=`<div class="ns-row"><select onchange="_nsr[${i}].icon=this.value">${ICNS.map(ic=>`<option${ic===r.icon?' selected':''}>${ic}</option>`).join('')}</select><input type="text" value="${r.name}" placeholder="分类名称" oninput="_nsr[${i}].name=this.value"/><input type="number" value="${r.budget}" placeholder="预算¥" oninput="_nsr[${i}].budget=+this.value"/><button class="xb" onclick="_nsr.splice(${i},1);renderNSR()">×</button></div>`;});w.innerHTML=h;}
function nsAdd(){window._nsr.push({icon:'🍜',name:'',budget:500});renderNSR();}

window._scRows=[];
function renderSCRows(){const w=document.getElementById('subcat-rows');if(!w)return;let h='';window._scRows.forEach((r,i)=>{if(r._del)return;h+=`<div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);"><select style="width:48px;padding:7px 5px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;background:var(--s2);color:var(--text);font-family:inherit;" onchange="_scRows[${i}].icon=this.value">${ICNS.map(ic=>`<option${ic===r.icon?' selected':''}>${ic}</option>`).join('')}</select><input type="text" value="${r.name}" placeholder="子目录名称" style="flex:1;padding:7px 10px;border:1.5px solid var(--border);border-radius:7px;font-size:13px;background:var(--s2);color:var(--text);font-family:inherit;" oninput="_scRows[${i}].name=this.value"/><button class="cmgr-minus" onclick="scDel(${i})">−</button></div>`;});w.innerHTML=h;}
function scAdd(){window._scRows.push({id:uid(),name:'',icon:'📦',_new:true});renderSCRows();}
function scDel(i){if(window._scRows[i]._new){window._scRows.splice(i,1);renderSCRows();return;}window._scRows[i]._del=true;renderSCRows();}
function scSave(){const cat=V.mainCats.find(c=>c.id===V._subcatCat);if(!cat)return;cat.subcats=window._scRows.filter(r=>!r._del&&r.name.trim()).map(r=>({id:r.id,name:r.name.trim(),icon:r.icon}));V.overlay='catdetail';V._detailCat=V._subcatCat;saveData();renderOverlay();}

function pNS(c){V._ns.color=c;document.querySelectorAll('#ns-cr .cdot').forEach(d=>d.classList.toggle('s',d.dataset.c===c));}
function saveEC(){const name=document.getElementById('ec-n').value.trim(),budget=parseFloat(document.getElementById('ec-b').value),icon=document.getElementById('ec-i').value;if(!name||isNaN(budget)||budget<=0)return;const cats=inSub()?(curSub()||{cats:[]}).cats:V.mainCats;const c=cats.find(x=>x.id===V._editCat.id);if(c){c.name=name;c.budget=budget;c.icon=icon;if(V._ec.color)c.color=V._ec.color;}V.overlay='catdetail';V._detailCat=V._editCat.id;V._editCat=null;saveData();renderOverlay();}
function createSub(){const name=document.getElementById('ns-name')?.value.trim(),icon=document.getElementById('ns-icon')?.value||'📒';if(!name){alert('请填写子账本名称');return;}const cats=window._nsr.filter(r=>r.name.trim()).map(r=>({id:uid(),name:r.name.trim(),icon:r.icon,color:COLS[Math.floor(Math.random()*COLS.length)],budget:r.budget||500}));V.subs.push({id:uid(),name,icon,color:V._ns.color,parentCatId:V._subFor,cats,recs:[]});V.overlay='catdetail';V._detailCat=V._subFor;saveData();renderOverlay();}
function saveES(){const s=V.subs.find(x=>x.id===V._editSub.id);if(!s)return;s.name=document.getElementById('es-name').value.trim()||s.name;s.icon=document.getElementById('es-icon').value;if(V._es.color)s.color=V._es.color;saveData();closeOverlay();}
function delRec(id){if(inSub()){const s=curSub();if(s)s.recs=s.recs.filter(r=>r.id!==id);}else V.mainRecs=V.mainRecs.filter(r=>r.id!==id);saveData();if(V.view==='main'&&V.overlay==='catdetail')renderOverlay();else closeRecordPage();}
function delSub(id){if(!confirm('删除该子账本及所有记录？'))return;V.subs=V.subs.filter(s=>s.id!==id);if(V.view===id)V.view='main';saveData();closeOverlay();}

// ── AI Analysis ──
async function runAnalysis(cats,spent,prevSpent,lySpent){
  const btn=document.getElementById('analyze-btn');const result=document.getElementById('ai-result');
  if(!btn||!result)return;
  btn.disabled=true;btn.textContent='✨ AI 分析中…';
  result.innerHTML=`<div style="text-align:center;padding:20px;color:var(--t3);font-size:13px;">正在生成分析报告…</div>`;
  const cm=V.month,cy=V.year,{m:pm,y:py}=prevMY();
  const catLines=cats.map(c=>`- ${c.icon}${c.name}：预算 ${fmt(c.budget)}，实际 ${fmt(c.spent)}，使用 ${c.pct}%`).join('\n');
  const prompt=`你是专业的个人财务顾问，请根据以下支出数据给出简洁实用的分析和预算调整建议。

${cy}年${MN[cm]}数据：
- 月度总预算：${fmt(V.totalBudget)}，已支出：${fmt(spent)}（${pct(spent,V.totalBudget)}%）
- 环比上月：${prevSpent?((spent-prevSpent)/prevSpent*100).toFixed(0)+'%':'无数据'}
- 同比去年：${lySpent?((spent-lySpent)/lySpent*100).toFixed(0)+'%':'无数据'}

各类目：
${catLines}

请按以下结构回复（控制在350字以内，语言简洁友好）：

## 本月亮点
指出做得好的地方

## 需要关注
超支或接近超支的类目及原因

## 具体建议
3-4条可执行的建议，要具体到金额或频次

## 下月预算建议
只列出需要调整的类目和建议金额`;
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await resp.json();
    const text=data.content?.[0]?.text||'';
    if(!text)throw new Error('返回内容为空');
    const html=text.split('\n').map(line=>{
      if(line.startsWith('## '))return`<div class="ai-h">${line.slice(3)}</div>`;
      if(line.startsWith('- '))return`<div class="ai-item"><span class="ai-dot">•</span><span>${line.slice(2)}</span></div>`;
      if(line.trim())return`<div style="font-size:12px;color:var(--t2);line-height:1.7;margin-bottom:4px;">${line}</div>`;
      return'';
    }).join('');
    result.innerHTML=`<div class="ai-result">${html}</div><div style="display:flex;gap:8px;margin-top:10px;"><button class="btn-g" style="font-size:12px;padding:9px;" onclick="showOverlay('catmgr')">调整预算 →</button><button class="btn-g" style="font-size:12px;padding:9px;" onclick="runAnalysis(${JSON.stringify(cats).replace(/"/g,'&quot;')},${spent},${prevSpent},${lySpent})">重新分析</button></div>`;
    btn.textContent='✨ 重新分析';btn.disabled=false;
  }catch(e){
    result.innerHTML=`<div style="font-size:12px;color:var(--red);padding:12px 0;">分析失败：${e.message}</div>`;
    btn.textContent='✨ 让 AI 分析我的支出';btn.disabled=false;
  }
}

function doImport(){
  const txt=document.getElementById('imp-t')?.value?.trim(),msg=document.getElementById('imp-msg');
  if(!txt){if(msg)msg.textContent='请粘贴数据';return;}
  if(V.impFmt==='csv'){
    const lines=txt.split('\n'),hd=lines[0].split(',').map(s=>s.trim());
    const di=hd.indexOf('日期'),ci=hd.indexOf('分类'),dsi=hd.indexOf('描述'),ai=hd.indexOf('金额');
    if(di<0||ci<0||dsi<0||ai<0){if(msg)msg.textContent='表头需含：日期,分类,描述,金额';return;}
    const cats=inSub()?(curSub()||{cats:[]}).cats:V.mainCats,recs=[];
    for(let i=1;i<lines.length;i++){const cols=lines[i].split(',');const date=cols[di]?.trim(),cn=cols[ci]?.trim(),desc=cols[dsi]?.trim(),amt=parseFloat(cols[ai]?.trim());if(!date||!cn||isNaN(amt))continue;let cat=cats.find(c=>c.name===cn);if(!cat){cat={id:uid(),name:cn,budget:1000,color:COLS[cats.length%COLS.length],icon:'📋',subcats:[]};cats.push(cat);}recs.push({id:uid(),catId:cat.id,subCatId:null,desc:desc||'',amount:amt,date,loc:''});}
    if(inSub()){const s=curSub();if(s)s.recs.push(...recs);}else V.mainRecs.push(...recs);
    saveData();closeOverlay();
  }else{
    try{const data=JSON.parse(txt);if(!data.mainCats||!data.mainRecs)throw new Error('格式不对');if(!confirm('导入 JSON 将覆盖全部数据，确认？'))return;V.totalBudget=data.totalBudget||V.totalBudget;V.mainCats=data.mainCats;V.mainRecs=data.mainRecs;V.subs=data.subs||[];saveData();closeOverlay();}
    catch(e){if(msg)msg.textContent='解析失败：'+e.message;}
  }
}

if(launched){
